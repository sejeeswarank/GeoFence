<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoFence Login</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08131a;color:#eefbfd;font-family:Segoe UI,sans-serif}
  .card{width:min(100%,420px);padding:28px;border:1px solid #21404d;border-radius:20px;background:#0d2029}
  h1{margin:8px 0 10px} p{color:#90adb6;line-height:1.5} form{display:grid;gap:12px}
  label{display:grid;gap:6px;color:#90adb6}
  input{padding:12px 14px;border-radius:12px;border:1px solid #28424f;background:#09161c;color:#eefbfd}
  button{padding:12px 16px;border:0;border-radius:12px;background:#59f2c2;color:#041319;font-weight:700;cursor:pointer}
  .msg{min-height:24px;margin-top:12px}.err{color:#ff8a4c}.ok{color:#59f2c2} a{color:#59f2c2}
</style>
</head>
<body>
<main class="card">
  <div>Firebase Login</div>
  <h1>Sign in</h1>
  <p>Use your Firebase account to access the GeoFence dashboard and Drive sync.</p>
  <form id="loginForm">
    <label>Email<input id="email" type="email" required></label>
    <label>Password<input id="password" type="password" required></label>
    <button id="submitBtn" type="submit">Log In</button>
  </form>
  <div id="msg" class="msg"></div>
  <p>Need an account? <a href="/register">Create one</a></p>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
const form=document.getElementById("loginForm"),msg=document.getElementById("msg"),submitBtn=document.getElementById("submitBtn");
const setMsg=(text,cls="")=>{msg.textContent=text;msg.className=`msg ${cls}`.trim();};
async function initAuth(){const r=await fetch("/auth/firebase-config");const p=await r.json();if(!p.configured) throw new Error(p.message||"Firebase not configured.");return getAuth(initializeApp(p.config));}
let auth;
try{auth=await initAuth();onAuthStateChanged(auth,(user)=>{if(user) window.location.replace("/app");});}catch(error){setMsg(error.message,"err");submitBtn.disabled=true;}
form.addEventListener("submit",async(event)=>{event.preventDefault();if(!auth) return;setMsg("Signing in...","ok");submitBtn.disabled=true;try{await signInWithEmailAndPassword(auth,document.getElementById("email").value.trim(),document.getElementById("password").value);window.location.replace("/app");}catch(error){setMsg(error.message,"err");submitBtn.disabled=false;}});
</script>
</body>
</html>
